<section class="hero text-center py-5">

  <div class="container">

    <img
      src="assets/images/profile.jpg"
      alt="profile"
      class="profile-img mb-4"
    />

    <h1 class="display-4 fw-bold">Ciao, sono [TUO NOME]</h1>

    <p class="lead text-secondary">
      Full Stack Web Developer
    </p>

    <p class="description mx-auto">
      Sviluppo applicazioni web moderne con Angular, TypeScript,
      Node.js e MySQL.
    </p>

    <div class="mt-4 d-flex justify-content-center gap-3 flex-wrap">
      <a routerLink="/projects" class="btn btn-primary btn-lg">
        I miei progetti
      </a>

      <a routerLink="/contact" class="btn btn-outline-light btn-lg">
        Contattami
      </a>
    </div>

  </div>

</section>


<section class="skills py-5">

  <div class="container">

    <h2 class="text-center mb-5">Competenze</h2>

    <div class="row g-4">

      <div class="col-md-4" *ngFor="let skill of skills">
        <div class="skill-card text-center p-4">
          <h4>{{ skill.name }}</h4>
          <p>{{ skill.description }}</p>
        </div>
      </div>

    </div>

  </div>

</section>


<section class="projects-preview py-5">

  <div class="container text-center">

    <h2 class="mb-4">Ultimi progetti</h2>

    <p class="mb-4">
      Dai un’occhiata ai miei lavori recenti.
    </p>

    <a routerLink="/projects" class="btn btn-success">
      Vai ai progetti
    </a>

  </div>

</section>
