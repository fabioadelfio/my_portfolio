<section class="contact-page">
  <div class="contact-container">
    <div class="contact-info">
      <h1>📩 Contattami</h1>

      <p>Hai un progetto, una collaborazione o vuoi semplicemente metterti in contatto con me?</p>

      <div class="socials">
        <a href="https://github.com/fabioadelfio" target="_blank" rel="noopener noreferrer">
          <i class="bi bi-github"></i>
          GitHub
        </a>

        <a
          href="https://www.linkedin.com/in/fabioadelfio7/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="bi bi-linkedin"></i>
          LinkedIn
        </a>

        <a
          href="https://mail.google.com/mail/?view=cm&fs=1&to=adelfiofabio07@gmail.com"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="bi bi-envelope"></i>
          Email
        </a>
      </div>
    </div>

    <form class="contact-form" (ngSubmit)="submitForm()">
      <input type="text" placeholder="Nome" [(ngModel)]="contactData.name" name="name" required />

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="contactData.email"
        name="email"
        required
      />

      <textarea
        rows="6"
        placeholder="Messaggio"
        [(ngModel)]="contactData.message"
        name="message"
        required
      ></textarea>

      <button type="submit">Invia Messaggio</button>
    </form>
  </div>
</section>
